<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orçamento de Aço</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px;
    }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: 8px;
      color: #f8fafc;
      letter-spacing: 1px;
    }

    .subtitle {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 28px;
      font-size: 0.9rem;
    }

    .card {
      background: #1e293b;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
    }

    thead th {
      background: #334155;
      color: #94a3b8;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 12px 14px;
      text-align: center;
    }

    thead th:first-child { border-radius: 8px 0 0 8px; }
    thead th:last-child  { border-radius: 0 8px 8px 0; }

    tbody tr {
      border-bottom: 1px solid #334155;
      transition: background 0.15s;
    }

    tbody tr:hover { background: #263046; }

    tbody td {
      padding: 10px 14px;
      text-align: center;
      font-size: 0.92rem;
    }

    .diam {
      font-weight: 700;
      color: #38bdf8;
      font-size: 1rem;
    }

    input[type="number"] {
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 6px;
      color: #f1f5f9;
      padding: 6px 10px;
      width: 90px;
      text-align: center;
      font-size: 0.9rem;
      transition: border-color 0.2s;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: #38bdf8;
      box-shadow: 0 0 0 2px rgba(56,189,248,0.2);
    }

    .calc-cell {
      color: #cbd5e1;
    }

    .valor-barra {
      color: #a78bfa;
      font-weight: 600;
    }

    .valor-total-cell {
      color: #34d399;
      font-weight: 700;
      font-size: 1rem;
    }

    tfoot td {
      padding: 16px 14px;
      font-size: 1rem;
    }

    .total-label {
      text-align: right;
      color: #94a3b8;
      font-weight: 600;
      padding-right: 16px;
      letter-spacing: 0.5px;
    }

    .total-value {
      color: #34d399;
      font-weight: 800;
      font-size: 1.3rem;
      text-align: center;
      background: #064e3b22;
      border-radius: 8px;
    }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 22px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:hover { opacity: 0.85; transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .btn-add {
      background: #0ea5e9;
      color: #fff;
    }

    .btn-reset {
      background: #475569;
      color: #e2e8f0;
    }

    .btn-export-excel {
      background: #22c55e;
      color: #022c22;
    }

    .btn-export-pdf {
      background: #f97316;
      color: #111827;
    }

    .btn-del {
      background: transparent;
      border: 1px solid #ef444466;
      color: #f87171;
      padding: 5px 10px;
      font-size: 0.8rem;
      border-radius: 6px;
    }

    .btn-del:hover { background: #ef444422; }

    @media (max-width: 600px) {
      body { padding: 12px; }
      h1 { font-size: 1.3rem; }
    }

    /* Configuração básica para impressão em PDF (A4 paisagem) */
    @media print {
      body {
        background: white;
        color: black;
        padding: 0;
      }
      .card {
        box-shadow: none;
        border-radius: 0;
      }
      .btn-row {
        display: none;
      }
      h1, .subtitle {
        color: black;
      }
    }
  </style>
</head>
<body>

<h1>Orçamento de Aço</h1>
<p class="subtitle">VERTICE DISTRIBUIDORA E LOGISTICA LTDA</p>

<div class="card">
  <table id="tabela">
    <thead>
      <tr>
        <th>Diâmetro (mm)</th>
        <th>Peso/metro (kg/m)</th>
        <th>Comp. (m)</th>
        <th>Peso/barra (kg)</th>
        <th>Preço/kg (R$)</th>
        <th>Valor/barra (R$)</th>
        <th>Quantidade (barras)</th>
        <th>Valor total (R$)</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
    <tfoot>
      <tr>
        <td colspan="7" class="total-label">TOTAL GERAL</td>
        <td class="total-value" id="totalGeral">R$ 0,00</td>
        <td></td>
      </tr>
    </tfoot>
  </table>

  <div class="btn-row">
    <button class="btn-reset" onclick="resetar()">↺ Resetar</button>
    <button class="btn-add" onclick="adicionarLinha()">+ Adicionar linha</button>
    <button class="btn-export-excel" onclick="exportarExcel()">⬇ Exportar Excel</button>
    <button class="btn-export-pdf" onclick="exportarPDF()">⬇ Exportar PDF</button>
  </div>
</div>

<script>
  // Dados da sua planilha
  const dadosIniciais = [
    { diam: 5,    pesoPorMetro: 0.154, comp: 12, precoPorKg: 6, qtd: 1   },
    { diam: 6.3,  pesoPorMetro: 0.245, comp: 12, precoPorKg: 6, qtd: 1   },
    { diam: 8,    pesoPorMetro: 0.395, comp: 12, precoPorKg: 6, qtd: 1   },
    { diam: 10,   pesoPorMetro: 0.617, comp: 12, precoPorKg: 6, qtd: 1   },
    { diam: 12.5, pesoPorMetro: 0.963, comp: 12, precoPorKg: 6, qtd: 1   },
    { diam: 16,   pesoPorMetro: 1.578, comp: 12, precoPorKg: 6, qtd: 1   },
    { diam: 20,   pesoPorMetro: 2.466, comp: 12, precoPorKg: 6, qtd: 1   },
    { diam: 25,   pesoPorMetro: 3.853, comp: 12, precoPorKg: 6, qtd: 1   },
    { diam: 32,   pesoPorMetro: 6.313, comp: 12, precoPorKg: 6, qtd: 1   },
  ];

  let dados = JSON.parse(JSON.stringify(dadosIniciais));

  function fmt(v) {
    return v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function calcularLinha(d) {
    const pesoBarra  = d.pesoPorMetro * d.comp;
    const valorBarra = pesoBarra * d.precoPorKg;
    const valorTotal = valorBarra * d.qtd;
    return { pesoBarra, valorBarra, valorTotal };
  }

  function renderizar() {
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';

    let totalGeral = 0;

    dados.forEach((d, i) => {
      const { pesoBarra, valorBarra, valorTotal } = calcularLinha(d);
      totalGeral += valorTotal;

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>
          <input type="number" value="${d.diam}" min="0" step="0.1"
            onchange="atualizar(${i}, 'diam', this.value)"
            style="width:80px; color:#38bdf8; font-weight:700;" />
        </td>
        <td>
          <input type="number" value="${d.pesoPorMetro}" min="0" step="0.001"
            onchange="atualizar(${i}, 'pesoPorMetro', this.value)"
            style="width:90px;" />
        </td>
        <td>
          <input type="number" value="${d.comp}" min="0" step="0.1"
            onchange="atualizar(${i}, 'comp', this.value)"
            style="width:75px;" />
        </td>
        <td class="calc-cell">${fmt(pesoBarra)}</td>
        <td>
          <input type="number" value="${d.precoPorKg}" min="0" step="0.01"
            onchange="atualizar(${i}, 'precoPorKg', this.value)"
            style="width:80px;" />
        </td>
        <td class="valor-barra">R$ ${fmt(valorBarra)}</td>
        <td>
          <input type="number" value="${d.qtd}" min="0" step="1"
            onchange="atualizar(${i}, 'qtd', this.value)"
            style="width:75px;" />
        </td>
        <td class="valor-total-cell">R$ ${fmt(valorTotal)}</td>
        <td>
          <button class="btn-del" onclick="removerLinha(${i})">✕</button>
        </td>
      `;
      tbody.appendChild(tr);
    });

    document.getElementById('totalGeral').textContent = 'R$ ' + fmt(totalGeral);
  }

  function atualizar(i, campo, valor) {
    dados[i][campo] = parseFloat(valor) || 0;
    renderizar();
  }

  function adicionarLinha() {
    dados.push({ diam: 0, pesoPorMetro: 0, comp: 12, precoPorKg: 10, qtd: 1 });
    renderizar();
  }

  function removerLinha(i) {
    dados.splice(i, 1);
    renderizar();
  }

  function resetar() {
    if (confirm('Resetar para os dados originais?')) {
      dados = JSON.parse(JSON.stringify(dadosIniciais));
      renderizar();
    }
  }

  // EXPORTAR PARA EXCEL (na verdade CSV, abre normal no Excel)
  function exportarExcel() {
    const cabecalho = [
      'Diâmetro (mm)',
      'Peso/metro (kg/m)',
      'Comp. (m)',
      'Peso/barra (kg)',
      'Preço/kg (R$)',
      'Valor/barra (R$)',
      'Quantidade (barras)',
      'Valor total (R$)'
    ];

    const linhas = [];
    linhas.push(cabecalho.join(';'));

    let totalGeral = 0;

    dados.forEach(d => {
      const { pesoBarra, valorBarra, valorTotal } = calcularLinha(d);
      totalGeral += valorTotal;
      linhas.push([
        d.diam,
        d.pesoPorMetro,
        d.comp,
        pesoBarra.toFixed(3),
        d.precoPorKg,
        valorBarra.toFixed(2),
        d.qtd,
        valorTotal.toFixed(2)
      ].join(';'));
    });

    // linha de total
    linhas.push(['', '', '', '', '', '', 'TOTAL GERAL', totalGeral.toFixed(2)].join(';'));

    const conteudo = linhas.join('\n');
    const blob = new Blob([conteudo], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);

    const a = document.createElement('a');
    a.href = url;
    a.download = 'orcamento_aco.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // "Exportar PDF" usando a própria impressão do navegador
  function exportarPDF() {
    // Abre a caixa de diálogo de impressão; o usuário escolhe "Salvar como PDF"
    window.print();
  }

  // Inicializa a tabela
  renderizar();
</script>
</body>
</html>
